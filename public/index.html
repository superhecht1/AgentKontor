<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentKontor – Baue deinen KI-Agenten</title>
<script src="//unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
:root{--bg:#07070f;--bg2:#0c0c1a;--bg3:#111122;--card:#12121f;--border:rgba(255,255,255,.08);--purple:#6c5ce7;--purple-l:#a29bfe;--purple-d:#4a3db0;--white:#fff;--muted:#6b6b8a;--text:#d0d0e8;--green:#00cec9;--red:#e94560;--gold:#f0c040}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}
input,textarea,select{font-family:inherit}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-box{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 36px}
.auth-logo{font-size:1.5rem;font-weight:800;color:var(--white);margin-bottom:28px;text-align:center}
.auth-logo span{color:var(--purple-l)}
.auth-title{font-size:1.4rem;font-weight:700;color:var(--white);margin-bottom:4px}
.auth-sub{font-size:.85rem;color:var(--muted);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:5px}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--white);font-size:.9rem;transition:border-color .2s}
.inp:focus{outline:none;border-color:var(--purple);background:rgba(108,92,231,.05)}
.inp::placeholder{color:var(--muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:8px;font-size:.88rem;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--purple);color:#fff}.btn-primary:hover{background:var(--purple-d)}
.btn-full{width:100%}
.btn-sm{padding:7px 14px;font-size:.8rem}
.btn-ghost{background:transparent;color:var(--purple-l);border:1px solid rgba(108,92,231,.3)}.btn-ghost:hover{background:rgba(108,92,231,.1)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{filter:brightness(1.15)}
.btn-green{background:var(--green);color:#07070f}.btn-green:hover{filter:brightness(1.1)}
.auth-switch{text-align:center;margin-top:20px;font-size:.83rem;color:var(--muted)}
.auth-switch a{color:var(--purple-l);cursor:pointer}
.err{background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.25);color:var(--red);padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:16px}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;padding:0}
.sidebar-logo{padding:22px 20px 16px;font-size:1.2rem;font-weight:800;color:var(--white);border-bottom:1px solid var(--border)}
.sidebar-logo span{color:var(--purple-l)}
.sidebar-nav{flex:1;padding:12px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:.87rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:2px}
.nav-item:hover,.nav-item.active{background:rgba(108,92,231,.12);color:var(--white)}
.nav-item.active{color:var(--purple-l)}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted)}
.sidebar-user{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple-l));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:.82rem;color:var(--text);font-weight:500}
.logout-btn{font-size:.75rem;color:var(--muted);cursor:pointer;transition:color .2s}
.logout-btn:hover{color:var(--red)}

.main{flex:1;overflow-y:auto;background:var(--bg)}
.page{padding:32px 36px;max-width:1100px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.page-title{font-size:1.5rem;font-weight:700;color:var(--white)}
.page-sub{font-size:.85rem;color:var(--muted);margin-top:2px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.card-sm{padding:18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* AGENT CARD */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.agent-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer}
.agent-card:hover{border-color:rgba(108,92,231,.35);transform:translateY(-2px)}
.agent-stripe{height:4px}
.agent-body{padding:20px}
.agent-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.agent-av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.agent-name{font-size:1rem;font-weight:700;color:var(--white)}
.agent-desc{font-size:.78rem;color:var(--muted);margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.agent-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.badge{font-size:.65rem;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.04em}
.badge-active{background:rgba(0,206,201,.12);color:var(--green);border:1px solid rgba(0,206,201,.2)}
.badge-inactive{background:rgba(233,69,96,.1);color:var(--red);border:1px solid rgba(233,69,96,.2)}
.badge-widget{background:rgba(108,92,231,.1);color:var(--purple-l);border:1px solid rgba(108,92,231,.2)}
.badge-api{background:rgba(240,192,64,.1);color:var(--gold);border:1px solid rgba(240,192,64,.2)}
.badge-wa{background:rgba(37,211,102,.1);color:#25d366;border:1px solid rgba(37,211,102,.2)}
.badge-tg{background:rgba(0,136,204,.1);color:#0088cc;border:1px solid rgba(0,136,204,.2)}
.agent-stats{font-size:.75rem;color:var(--muted);border-top:1px solid var(--border);padding-top:10px;margin-top:10px;display:flex;gap:16px}
.agent-stat strong{color:var(--text)}

/* EMPTY STATE */
.empty{text-align:center;padding:64px 24px;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:16px}
.empty h3{font-size:1.1rem;font-weight:600;color:var(--white);margin-bottom:6px}
.empty p{font-size:.85rem;margin-bottom:24px}

/* FORM */
.form-section{margin-bottom:24px}
.form-section-title{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--purple-l);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
textarea.inp{resize:vertical;min-height:90px;line-height:1.5}
select.inp option{background:var(--bg3)}
.hint{font-size:.74rem;color:var(--muted);margin-top:4px}
.char-count{font-size:.7rem;color:var(--muted);text-align:right;margin-top:2px}

/* EMOJI PICKER */
.emoji-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.emo{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emo:hover,.emo.active{border-color:var(--purple);background:rgba(108,92,231,.15)}

/* TONE */
.tone-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:6px}
.tone-opt{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.03);cursor:pointer;transition:all .15s}
.tone-opt:hover,.tone-opt.active{border-color:var(--purple);background:rgba(108,92,231,.1)}
.tone-opt h4{font-size:.84rem;font-weight:600;color:var(--white);margin-bottom:1px}
.tone-opt p{font-size:.72rem;color:var(--muted)}

/* CHIPS */
.chip-row{display:flex;gap:8px;margin-bottom:8px}
.chip-row .inp{flex:1}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px}
.chip-tag{display:flex;align-items:center;gap:6px;background:rgba(108,92,231,.12);border:1px solid rgba(108,92,231,.25);border-radius:20px;padding:4px 12px;font-size:.77rem;color:var(--purple-l)}
.chip-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;line-height:1;transition:color .2s}
.chip-del:hover{color:var(--red)}

/* COLOR PICKER */
.color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.color-opt:hover{transform:scale(1.15)}
.color-opt.active{border-color:var(--white);transform:scale(1.1)}

/* PREVIEW */
.preview-window{background:#0f0f1e;border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.pw-header{padding:12px 16px;display:flex;align-items:center;gap:10px}
.pw-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.pw-name{font-size:.88rem;font-weight:700;color:#fff}
.pw-status{font-size:.7rem;color:var(--green);display:flex;align-items:center;gap:4px}
.pw-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.pw-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.pw-bubble{padding:8px 12px;border-radius:12px;font-size:.82rem;line-height:1.5;max-width:88%}
.pw-bubble.assistant{background:#1e1e38;color:#e0e0f0;border-bottom-left-radius:3px;align-self:flex-start}
.pw-bubble.user{color:#fff;border-bottom-right-radius:3px;align-self:flex-end}
.pw-input-row{padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px}
.pw-inp{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 12px;color:#e0e0f0;font-size:.8rem}
.pw-send{width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem}

/* INTEGRATIONS */
.integ-item{display:flex;align-items:flex-start;gap:16px;padding:18px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.02);margin-bottom:10px}
.integ-icon{font-size:1.6rem;flex-shrink:0;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.integ-info{flex:1}
.integ-name{font-size:.92rem;font-weight:600;color:var(--white);margin-bottom:2px}
.integ-desc{font-size:.78rem;color:var(--muted);margin-bottom:10px}
.toggle{position:relative;display:inline-block;width:42px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:22px;transition:.3s;cursor:pointer}
.slider:before{position:absolute;content:"";width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--purple)}
input:checked+.slider:before{transform:translateX(20px)}

/* CODE BLOCK */
.code-block{background:#0a0a18;border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'Courier New',monospace;font-size:.78rem;color:#a29bfe;overflow-x:auto;position:relative;white-space:pre-wrap;word-break:break-all}
.copy-btn{position:absolute;top:8px;right:8px;background:rgba(108,92,231,.2);border:1px solid rgba(108,92,231,.3);border-radius:6px;padding:4px 10px;font-size:.72rem;color:var(--purple-l);cursor:pointer;transition:background .2s}
.copy-btn:hover{background:rgba(108,92,231,.4)}

/* STATS */
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center}
.stat-num{font-size:2rem;font-weight:700;color:var(--purple-l);line-height:1;margin-bottom:4px}
.stat-label{font-size:.75rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* TOAST */
.toast-area{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{background:#1e1e38;border:1px solid rgba(108,92,231,.3);border-radius:10px;padding:12px 18px;font-size:.84rem;color:var(--white);box-shadow:0 8px 24px rgba(0,0,0,.3);animation:slideIn .3s ease;display:flex;align-items:center;gap:10px}
.toast-item.success{border-color:rgba(0,206,201,.3)}
.toast-item.error{border-color:rgba(233,69,96,.3);color:var(--red)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* API KEYS */
.key-row{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.key-code{font-family:monospace;font-size:.82rem;color:var(--purple-l);flex:1;background:#0a0a18;padding:5px 10px;border-radius:6px}
.key-label{font-size:.82rem;color:var(--text)}
.key-date{font-size:.72rem;color:var(--muted);white-space:nowrap}

/* TABS */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:10px 18px;font-size:.85rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
.tab:hover{color:var(--white)}
.tab.active{color:var(--purple-l);border-bottom-color:var(--purple-l)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:32px}
.modal-title{font-size:1.2rem;font-weight:700;color:var(--white);margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}

@media(max-width:768px){
  .sidebar{display:none}
  .page{padding:20px 16px}
  .inp-row{grid-template-columns:1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body x-data="app()" x-init="init()">

<!-- AUTH -->
<div class="auth-wrap" x-show="!user" x-cloak>
  <div class="auth-box">
    <div class="auth-logo">Agent<span>Kontor</span></div>

    <!-- LOGIN -->
    <template x-if="authMode === 'login'">
      <div>
        <h2 class="auth-title" x-text="lang==='de'?'Willkommen zurück':'Welcome back'"></h2>
        <p class="auth-sub" x-text="lang==='de'?'Melde dich an um deine Agenten zu verwalten':'Sign in to manage your agents'"></p>
        <div class="err" x-show="authError" x-text="authError"></div>
        <div class="field"><label x-text="lang==='de'?'E-Mail':'Email'"></label><input class="inp" type="email" x-model="loginForm.email" placeholder="name@beispiel.de"></div>
        <div class="field"><label x-text="lang==='de'?'Passwort':'Password'"></label><input class="inp" type="password" x-model="loginForm.password" @keydown.enter="login()" placeholder="••••••••"></div>
        <button class="btn btn-primary btn-full" @click="login()" :disabled="loading">
          <span x-text="loading?(lang==='de'?'Anmelden...':'Signing in...'):(lang==='de'?'Anmelden':'Sign in')"></span>
        </button>
        <div class="auth-switch" x-text="lang==='de'?'Noch kein Konto?':'No account yet?'"> <a @click="authMode='register'" x-text="lang==='de'?' Registrieren':' Register'"></a></div>
        <div style="text-align:center;margin-top:12px">
          <button @click="lang=lang==='de'?'en':'de'" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem" x-text="lang==='de'?'🇬🇧 English':'🇩🇪 Deutsch'"></button>
        </div>
      </div>
    </template>

    <!-- REGISTER -->
    <template x-if="authMode === 'register'">
      <div>
        <h2 class="auth-title" x-text="lang==='de'?'Konto erstellen':'Create account'"></h2>
        <p class="auth-sub" x-text="lang==='de'?'Kostenlos starten — keine Kreditkarte nötig':'Start free — no credit card needed'"></p>
        <div class="err" x-show="authError" x-text="authError"></div>
        <div class="field"><label x-text="lang==='de'?'Name':'Name'"></label><input class="inp" type="text" x-model="regForm.name" placeholder="Max Mustermann"></div>
        <div class="field"><label>E-Mail</label><input class="inp" type="email" x-model="regForm.email" placeholder="name@beispiel.de"></div>
        <div class="field"><label x-text="lang==='de'?'Passwort':'Password'"></label><input class="inp" type="password" x-model="regForm.password" placeholder="Min. 8 Zeichen"></div>
        <button class="btn btn-primary btn-full" @click="register()" :disabled="loading">
          <span x-text="loading?(lang==='de'?'Wird erstellt...':'Creating...'):(lang==='de'?'Kostenlos starten':'Start for free')"></span>
        </button>
        <div class="auth-switch"><span x-text="lang==='de'?'Bereits ein Konto?':'Already have an account?'"></span> <a @click="authMode='login'" x-text="lang==='de'?' Anmelden':' Sign in'"></a></div>
      </div>
    </template>
  </div>
</div>

<!-- APP -->
<div class="app" x-show="user" x-cloak>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">Agent<span>Kontor</span></div>
    <nav class="sidebar-nav">
      <div class="nav-item" :class="{active:page==='dashboard'}" @click="page='dashboard'"><span class="nav-icon">🏠</span><span x-text="lang==='de'?'Dashboard':'Dashboard'"></span></div>
      <div class="nav-item" :class="{active:page==='agents'}" @click="page='agents';loadAgents()"><span class="nav-icon">🤖</span><span x-text="lang==='de'?'Meine Agenten':'My Agents'"></span></div>
      <div class="nav-item" :class="{active:page==='keys'}" @click="page='keys';loadKeys()"><span class="nav-icon">🔑</span><span x-text="lang==='de'?'API Keys':'API Keys'"></span></div>
      <div class="nav-item" :class="{active:page==='docs'}" @click="page='docs'"><span class="nav-icon">📖</span><span x-text="lang==='de'?'Dokumentation':'Documentation'"></span></div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-av" x-text="user?.name?.[0]?.toUpperCase()??'U'"></div>
        <div>
          <div class="user-name" x-text="user?.name"></div>
          <div style="font-size:.7rem" x-text="'Plan: '+(user?.plan||'Free')"></div>
        </div>
      </div>
      <span class="logout-btn" @click="logout()" x-text="lang==='de'?'Abmelden':'Logout'"></span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- DASHBOARD -->
    <div class="page" x-show="page==='dashboard'">
      <div class="page-header">
        <div>
          <div class="page-title" x-text="lang==='de'?'Dashboard':'Dashboard'"></div>
          <div class="page-sub" x-text="lang==='de'?'Übersicht deiner Agenten':'Overview of your agents'"></div>
        </div>
        <button class="btn btn-primary" @click="openNewAgent()">+ <span x-text="lang==='de'?'Neuer Agent':'New Agent'"></span></button>
      </div>
      <div class="grid-3" style="margin-bottom:28px">
        <div class="stat-box"><div class="stat-num" x-text="agents.length"></div><div class="stat-label" x-text="lang==='de'?'Agenten':'Agents'"></div></div>
        <div class="stat-box"><div class="stat-num" x-text="agents.filter(a=>a.is_active).length"></div><div class="stat-label" x-text="lang==='de'?'Aktiv':'Active'"></div></div>
        <div class="stat-box"><div class="stat-num" x-text="agents.reduce((s,a)=>s+a.total_messages,0)"></div><div class="stat-label" x-text="lang==='de'?'Nachrichten':'Messages'"></div></div>
      </div>
      <div style="margin-bottom:20px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:.9rem;font-weight:600;color:var(--white)" x-text="lang==='de'?'Deine Agenten':'Your Agents'"></div>
      </div>
      <template x-if="agents.length===0">
        <div class="empty">
          <div class="empty-icon">🤖</div>
          <h3 x-text="lang==='de'?'Noch kein Agent':'No agents yet'"></h3>
          <p x-text="lang==='de'?'Erstelle deinen ersten KI-Agenten in wenigen Minuten.':'Create your first AI agent in minutes.'"></p>
          <button class="btn btn-primary" @click="openNewAgent()" x-text="lang==='de'?'Ersten Agenten erstellen':'Create first agent'"></button>
        </div>
      </template>
      <div class="agent-grid">
        <template x-for="a in agents" :key="a.id">
          <div class="agent-card" @click="editAgent(a)">

      </template>
      <div class="agent-grid">
        <template x-for="a in agents" :key="a.id">
          <div class="agent-card" @click="editAgent(a)">
            <div class="agent-stripe" :style="`background:${a.color}`"></div>
            <div class="agent-body">
              <div class="agent-header">
                <div class="agent-av" :style="`background:${a.color}22;border:1px solid ${a.color}44`" x-text="a.emoji"></div>
                <div><div class="agent-name" x-text="a.name"></div><div class="agent-desc" x-text="a.description"></div></div>
              </div>
              <div class="agent-badges">
                <span class="badge" :class="a.is_active?'badge-active':'badge-inactive'" x-text="a.is_active?'Aktiv':'Inaktiv'"></span>

                <span class="badge badge-api" x-show="a.api_enabled">API</span>
                <span class="badge badge-wa" x-show="a.whatsapp_enabled">WhatsApp</span>
                <span class="badge badge-tg" x-show="a.telegram_enabled">Telegram</span>

    <!-- API KEYS -->
    <div class="page" x-show="page==='keys'">
      <div class="page-header">
        <div><div class="page-title">API Keys</div><div class="page-sub" x-text="lang==='de'?'Für Entwickler und externe Integrationen':'For developers and external integrations'"></div></div>
        <button class="btn btn-primary" @click="showNewKey=true">+ <span x-text="lang==='de'?'Neuer Key':'New Key'"></span></button>
      </div>

      <!-- New key revealed -->
      <template x-if="newKeyRevealed">
        <div class="card" style="border-color:rgba(0,206,201,.3);margin-bottom:20px">
          <div style="color:var(--green);font-weight:600;margin-bottom:8px">✓ <span x-text="lang==='de'?'Key erstellt — nur einmal sichtbar!':'Key created — visible only once!'"></span></div>

        </div>

      <template x-if="apiKeys.length===0">

      <template x-for="k in apiKeys" :key="k.id">

    <!-- DOCS -->
    <div class="page" x-show="page==='docs'">
      <div class="page-header"><div><div class="page-title" x-text="lang==='de'?'API Dokumentation':'API Documentation'"></div><div class="page-sub">REST API · Webhooks · Widget</div></div></div>

      <div class="tabs">
        <div class="tab" :class="{active:docsTab==='api'}" @click="docsTab='api'">REST API</div>
        <div class="tab" :class="{active:docsTab==='widget'}" @click="docsTab='widget'">Widget</div>
        <div class="tab" :class="{active:docsTab==='webhook'}" @click="docsTab='webhook'">Webhooks</div>
      </div>

      <template x-if="docsTab==='api'">
        <div>
          <div class="card" style="margin-bottom:16px">
            <div style="font-weight:600;color:var(--white);margin-bottom:8px">Chat mit Agent (POST)</div>
            <div class="code-block">POST /api/chat/api/:agentId

Headers:
  x-api-key: ak_live_xxxxxxxxxx
  Content-Type: application/json

Body:
{
  "messages": [
    {"role": "user", "content": "Hallo, wie geht's?"}
  ],
  "sessionId": "optional-session-id"
}

Response:
{
  "reply": "Hallo! Mir geht es gut. Wie kann ich helfen?",
  "sessionId": "uuid-session-id"
}</div>
          </div>
          <div class="card">
            <div style="font-weight:600;color:var(--white);margin-bottom:8px">Multi-turn Gespräch</div>
            <div class="code-block">// Sende immer alle vorherigen Nachrichten mit
{
  "sessionId": "deine-session-id",
  "messages": [
    {"role": "user", "content": "Erste Frage"},
    {"role": "assistant", "content": "Erste Antwort"},
    {"role": "user", "content": "Folge-Frage"}
  ]
}</div>
          </div>
        </div>
      </template>

      <template x-if="docsTab==='widget'">
        <div>
          <div class="card">
            <div style="font-weight:600;color:var(--white);margin-bottom:8px">Widget einbinden</div>
            <p style="font-size:.84rem;color:var(--muted);margin-bottom:12px" x-text="lang==='de'?'Füge diese zwei Zeilen vor dem &lt;/body&gt; Tag deiner Website ein:':'Add these two lines before the &lt;/body&gt; tag of your website:'"></p>
            <div class="code-block" x-html="'&lt;script&gt;\n  window.AK_AGENT_ID = &quot;DEINE_AGENT_ID&quot;;\n&lt;/script&gt;\n&lt;script src=&quot;'+window.location.origin+'/widget.js&quot;&gt;&lt;/script&gt;'"></div>
            <p style="font-size:.78rem;color:var(--muted);margin-top:10px" x-text="lang==='de'?'Die Agent ID findest du im Agent-Editor.':'Find the Agent ID in the agent editor.'"></p>
          </div>
        </div>
      </template>

      <template x-if="docsTab==='webhook'">
        <div>
          <div class="card" style="margin-bottom:16px">
            <div style="font-weight:600;color:var(--white);margin-bottom:8px">Telegram Webhook</div>
            <div class="code-block" x-html="'Webhook URL:\n'+window.location.origin+'/webhook/telegram/DEIN_BOT_TOKEN\n\nSetup:\nhttps://api.telegram.org/botTOKEN/setWebhook?url='+window.location.origin+'/webhook/telegram/TOKEN'"></div>
          </div>
          <div class="card">
            <div style="font-weight:600;color:var(--white);margin-bottom:8px">WhatsApp (Meta Cloud API)</div>
            <div class="code-block" x-html="'Webhook URL:\n'+window.location.origin+'/webhook/whatsapp\n\nVerify Token: Im .env setzen als WHATSAPP_VERIFY_TOKEN'"></div>
          </div>
        </div>
      </template>
    </div>
  </div><!-- /main -->
</div><!-- /app -->

<!-- AGENT MODAL (New/Edit) -->
<div class="modal-bg" x-show="showAgentModal" @click.self="showAgentModal=false" x-cloak>

    <div class="modal-title" x-text="editingAgent?(lang==='de'?'Agent bearbeiten':'Edit Agent'):(lang==='de'?'Neuen Agenten erstellen':'Create New Agent')"></div>

    <div class="tabs" style="margin-bottom:16px">
      <div class="tab" :class="{active:agentTab==='basics'}" @click="agentTab='basics'" x-text="lang==='de'?'Grundlagen':'Basics'"></div>
      <div class="tab" :class="{active:agentTab==='behavior'}" @click="agentTab='behavior'" x-text="lang==='de'?'Verhalten':'Behavior'"></div>
      <div class="tab" :class="{active:agentTab==='integrations'}" @click="agentTab='integrations'" x-text="lang==='de'?'Integrationen':'Integrations'"></div>
      <div class="tab" :class="{active:agentTab==='preview'}" @click="agentTab='preview'" x-text="lang==='de'?'Vorschau':'Preview'"></div>
      <template x-if="editingAgent">
        <div class="tab" :class="{active:agentTab==='embed'}" @click="agentTab='embed'" x-text="lang==='de'?'Einbetten':'Embed'"></div>
      </template>
    </div>

    <!-- BASICS TAB -->
    <template x-if="agentTab==='basics'">
      <div>
        <div class="form-section">
          <div class="form-section-title" x-text="lang==='de'?'Identität':'Identity'"></div>
          <div class="inp-row" style="margin-bottom:14px">
            <div class="field" style="margin:0">
              <label x-text="lang==='de'?'Name des Agenten':'Agent Name'"></label>
              <input class="inp" type="text" x-model="agentForm.name" :placeholder="lang==='de'?'z.B. Max, Mia, Support-Bot...':'e.g. Max, Mia, Support Bot...'">
            </div>
            <div class="field" style="margin:0">
              <label x-text="lang==='de'?'Sprache':'Language'"></label>
              <select class="inp" x-model="agentForm.language">
                <option value="de">🇩🇪 Deutsch</option>
                <option value="en">🇬🇧 English</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label x-text="lang==='de'?'Beschreibung (intern)':'Description (internal)'"></label>
            <input class="inp" type="text" x-model="agentForm.description" :placeholder="lang==='de'?'Wofür ist dieser Agent?':'What is this agent for?'">
          </div>
          <div class="field">
            <label>Emoji</label>
            <div class="emoji-grid">
              <template x-for="e in emojis" :key="e">
                <div class="emo" :class="{active:agentForm.emoji===e}" @click="agentForm.emoji=e" x-text="e"></div>
              </template>
            </div>
          </div>
          <div class="field">
            <label x-text="lang==='de'?'Farbe':'Color'"></label>
            <div class="color-grid">
              <template x-for="c in colors" :key="c">
                <div class="color-opt" :class="{active:agentForm.color===c}" :style="`background:${c}`" @click="agentForm.color=c"></div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- BEHAVIOR TAB -->
    <template x-if="agentTab==='behavior'">
      <div>
        <div class="field">
          <label x-text="lang==='de'?'System-Prompt (Anweisungen für den Agenten)':'System Prompt (Instructions for the agent)'"></label>
          <div class="hint" x-text="lang==='de'?'Beschreibe die Persönlichkeit, den Fokus und die Regeln des Agenten.':'Describe the personality, focus, and rules of the agent.'"></div>
          <textarea class="inp" rows="5" x-model="agentForm.system_prompt" :placeholder="lang==='de'?'Du bist [Name], ein KI-Assistent für [Unternehmen]. Deine Aufgabe ist es...':'You are [Name], an AI assistant for [Company]. Your task is to...'"></textarea>
        </div>
        <div class="field">
          <label x-text="lang==='de'?'Begrüßungsnachricht':'Greeting Message'"></label>
          <textarea class="inp" rows="2" x-model="agentForm.greeting" :placeholder="lang==='de'?'Hallo! Wie kann ich dir helfen?':'Hello! How can I help you?'"></textarea>
        </div>
        <div class="field">
          <label x-text="lang==='de'?'Kommunikationsstil':'Communication Style'"></label>
          <div class="tone-grid">
            <template x-for="t in tones" :key="t.key">
              <div class="tone-opt" :class="{active:agentForm.tone===t.key}" @click="agentForm.tone=t.key">
                <h4 x-text="lang==='de'?t.de:t.en"></h4>
                <p x-text="lang==='de'?t.desc_de:t.desc_en"></p>
              </div>
            </template>
          </div>
        </div>
        <div class="field">
          <label x-text="lang==='de'?'Schnellantworten (max. 5)':'Quick Replies (max. 5)'"></label>

          </div>
          <div class="chips-wrap">
            <template x-for="(chip,i) in agentForm.quick_chips" :key="i">
              <div class="chip-tag"><span x-text="chip"></span><button class="chip-del" @click="agentForm.quick_chips.splice(i,1)">✕</button></div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- INTEGRATIONS TAB -->
    <template x-if="agentTab==='integrations'">
      <div>
        <!-- Status -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px">
          <div style="flex:1"><div style="font-size:.9rem;font-weight:600;color:var(--white)" x-text="lang==='de'?'Agent aktiv':'Agent active'"></div><div style="font-size:.75rem;color:var(--muted)" x-text="lang==='de'?'Agent ist für Nutzer verfügbar':'Agent is available to users'"></div></div>
          <label class="toggle"><input type="checkbox" x-model="agentForm.is_active"><span class="slider"></span></label>
        </div>

        <div class="integ-item">
          <div class="integ-icon" style="background:rgba(108,92,231,.1)">🌐</div>
          <div class="integ-info">
            <div class="integ-name" x-text="lang==='de'?'Öffentliche Chat-Seite':'Public Chat Page'"></div>
            <div class="integ-desc" x-text="lang==='de'?'Teile einen Link — jeder kann mit deinem Agenten chatten.':'Share a link — anyone can chat with your agent.'"></div>
            <template x-if="editingAgent">
              <div style="font-size:.78rem;color:var(--purple-l)" x-text="window.location.origin+'/chat/'+editingAgent.public_id"></div>
            </template>
          </div>
          <label class="toggle"><input type="checkbox" x-model="agentForm.chatpage_enabled"><span class="slider"></span></label>
        </div>

        <!-- Widget -->
        <div class="integ-item">
          <div class="integ-icon" style="background:rgba(162,155,254,.1)">🔧</div>
          <div class="integ-info">
            <div class="integ-name">Widget</div>
            <div class="integ-desc" x-text="lang==='de'?'Chat-Widget auf deiner eigenen Website einbinden.':'Embed a chat widget on your own website.'"></div>
          </div>
          <label class="toggle"><input type="checkbox" x-model="agentForm.widget_enabled"><span class="slider"></span></label>
        </div>

        <!-- API -->
        <div class="integ-item">
          <div class="integ-icon" style="background:rgba(240,192,64,.1)">⚡</div>
          <div class="integ-info">
            <div class="integ-name">REST API</div>
            <div class="integ-desc" x-text="lang==='de'?'Zugriff über API Key für Entwickler.':'Access via API key for developers.'"></div>
          </div>
          <label class="toggle"><input type="checkbox" x-model="agentForm.api_enabled"><span class="slider"></span></label>
        </div>

        <!-- WhatsApp -->
        <div class="integ-item">
          <div class="integ-icon" style="background:rgba(37,211,102,.1)">📱</div>
          <div class="integ-info">
            <div class="integ-name">WhatsApp</div>
            <div class="integ-desc" x-text="lang==='de'?'Agent antwortet auf WhatsApp-Nachrichten (Meta Cloud API).':'Agent responds to WhatsApp messages (Meta Cloud API).'"></div>
            <template x-if="agentForm.whatsapp_enabled">
              <input class="inp" type="text" x-model="agentForm.whatsapp_number" :placeholder="lang==='de'?'Deine WhatsApp-Nummer (z.B. 4915123456789)':'Your WhatsApp number (e.g. 4915123456789)'" style="margin-top:8px">
            </template>
          </div>
          <label class="toggle"><input type="checkbox" x-model="agentForm.whatsapp_enabled"><span class="slider"></span></label>
        </div>

        <!-- Telegram -->
        <div class="integ-item">
          <div class="integ-icon" style="background:rgba(0,136,204,.1)">✈️</div>
          <div class="integ-info">
            <div class="integ-name">Telegram</div>
            <div class="integ-desc" x-text="lang==='de'?'Agent als Telegram-Bot. Bot-Token von @BotFather eingeben.':'Agent as Telegram bot. Enter bot token from @BotFather.'"></div>

          </div>
          <label class="toggle"><input type="checkbox" x-model="agentForm.telegram_enabled"><span class="slider"></span></label>
        </div>
      </div>
    </template>

            <div class="code-block" style="flex:1;padding:10px" x-text="window.location.origin+'/chat/'+editingAgent.public_id"></div>

      <button class="btn btn-ghost" @click="showAgentModal=false" x-text="lang==='de'?'Abbrechen':'Cancel'"></button>
      <button class="btn btn-primary" @click="saveAgent()" :disabled="saving">
        <span x-text="saving?(lang==='de'?'Speichern...':'Saving...'):(lang==='de'?'Speichern':'Save')"></span>
      </button>
    </div>
  </div>
</div>

<!-- NEW KEY MODAL -->
<div class="modal-bg" x-show="showNewKey" @click.self="showNewKey=false" x-cloak>
  <div class="modal" style="max-width:420px">
    <div class="modal-title" x-text="lang==='de'?'Neuen API Key erstellen':'Create New API Key'"></div>
    <div class="field"><label x-text="lang==='de'?'Bezeichnung':'Label'"></label><input class="inp" type="text" x-model="newKeyForm.label" :placeholder="lang==='de'?'z.B. Produktionskey':'e.g. Production key'"></div>
    <div class="field">
      <label x-text="lang==='de'?'Agent (optional)':'Agent (optional)'"></label>
      <select class="inp" x-model="newKeyForm.agentId">
        <option value="" x-text="lang==='de'?'Alle Agenten':'All agents'"></option>
        <template x-for="a in agents" :key="a.id"><option :value="a.id" x-text="a.emoji+' '+a.name"></option></template>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" @click="showNewKey=false" x-text="lang==='de'?'Abbrechen':'Cancel'"></button>
      <button class="btn btn-primary" @click="createKey()" x-text="lang==='de'?'Key erstellen':'Create Key'"></button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-area">
  <template x-for="t in toasts" :key="t.id">
    <div class="toast-item" :class="t.type" x-text="t.msg"></div>
  </template>
</div>

<script>
function app() {
  return {
    // State
    user: null, token: null, page: 'dashboard', lang: 'de',
    authMode: 'login', authError: '', loading: false,
    loginForm: { email:'', password:'' },
    regForm: { name:'', email:'', password:'' },
    agents: [], apiKeys: [],
    showAgentModal: false, showNewKey: false,
    editingAgent: null, saving: false,
    agentTab: 'basics', docsTab: 'api',
    chipInput: '', newKeyForm: { label:'', agentId:'' },
    newKeyRevealed: null, toasts: [],
    agentForm: {
      name:'', emoji:'🤖', description:'', system_prompt:'', greeting:'',
      tone:'professionell', language:'de', quick_chips:[], color:'#6c5ce7',
      is_active:true, widget_enabled:true, chatpage_enabled:true,
      api_enabled:false, whatsapp_enabled:false, whatsapp_number:'',
      telegram_enabled:false, telegram_token:''
    },
    emojis: ['🤖','💬','⭐','🎓','💡','🔥','🦾','🧠','✨','🚀','🏆','💼','🎯','🌟','⚡','🎪'],
    colors: ['#6c5ce7','#e94560','#00b894','#00aaff','#f39c12','#a29bfe','#fd79a8','#00cec9','#e17055','#74b9ff'],
    tones: [
      {key:'professionell',de:'Professionell',en:'Professional',desc_de:'Sachlich & klar',desc_en:'Factual & clear'},
      {key:'freundlich',de:'Freundlich',en:'Friendly',desc_de:'Warm & motivierend',desc_en:'Warm & motivating'},
      {key:'direkt',de:'Direkt',en:'Direct',desc_de:'Präzise & effizient',desc_en:'Precise & efficient'},
      {key:'locker',de:'Locker',en:'Casual',desc_de:'Entspannt & sympathisch',desc_en:'Relaxed & likeable'},
    ],

    async init() {
      const t = localStorage.getItem('ak_token');
      const u = localStorage.getItem('ak_user');
      if (t && u) { this.token = t; this.user = JSON.parse(u); this.loadAgents(); }
    },

    async api(path, method='GET', body=null) {
      const opts = { method, headers: { 'Content-Type':'application/json' } };
      if (this.token) opts.headers['Authorization'] = 'Bearer '+this.token;
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch('/api'+path, opts);
      return res.json();
    },

    async login() {
      this.loading=true; this.authError='';
      const data = await this.api('/auth/login','POST',this.loginForm);
      this.loading=false;
      if (data.error) { this.authError=data.error; return; }
      this.setUser(data.token, data.user);
    },

    async register() {
      this.loading=true; this.authError='';
      const data = await this.api('/auth/register','POST', {...this.regForm, lang:this.lang});
      this.loading=false;
      if (data.error) { this.authError=data.error; return; }
      this.setUser(data.token, data.user);
    },

    setUser(token, user) {
      this.token=token; this.user=user;
      localStorage.setItem('ak_token',token);
      localStorage.setItem('ak_user',JSON.stringify(user));
      this.lang = user.lang || 'de';
      this.loadAgents();
    },

    logout() {
      this.token=null; this.user=null;
      localStorage.removeItem('ak_token'); localStorage.removeItem('ak_user');
    },

    async loadAgents() {
      const data = await this.api('/agents');
      if (data.agents) this.agents = data.agents;
    },

    openNewAgent() {
      this.editingAgent=null; this.agentTab='basics';
      this.agentForm = {
        name:'', emoji:'🤖', description:'', system_prompt:'', greeting:'',
        tone:'professionell', language:this.lang, quick_chips:[], color:'#6c5ce7',
        is_active:true, widget_enabled:true, chatpage_enabled:true,
        api_enabled:false, whatsapp_enabled:false, whatsapp_number:'',
        telegram_enabled:false, telegram_token:''
      };
      this.showAgentModal=true;
    },

    async editAgent(a) {
      const data = await this.api('/agents/'+a.id);
      if (!data.agent) return;
      this.editingAgent = data.agent;
      this.agentForm = {
        name:data.agent.name, emoji:data.agent.emoji,
        description:data.agent.description, system_prompt:data.agent.system_prompt,
        greeting:data.agent.greeting, tone:data.agent.tone, language:data.agent.language,
        quick_chips:data.agent.quick_chips||[], color:data.agent.color,
        is_active:data.agent.is_active, widget_enabled:data.agent.widget_enabled,
        chatpage_enabled:data.agent.chatpage_enabled, api_enabled:data.agent.api_enabled,
        whatsapp_enabled:data.agent.whatsapp_enabled, whatsapp_number:data.agent.whatsapp_number||'',
        telegram_enabled:data.agent.telegram_enabled, telegram_token:data.agent.telegram_token||''
      };
      this.agentTab='basics'; this.showAgentModal=true;
    },

    async saveAgent() {
      if (!this.agentForm.name) { this.toast(this.lang==='de'?'Name erforderlich':'Name required','error'); return; }
      if (!this.agentForm.system_prompt) { this.toast(this.lang==='de'?'System-Prompt erforderlich':'System prompt required','error'); return; }
      this.saving=true;
      let data;
      if (this.editingAgent) {
        data = await this.api('/agents/'+this.editingAgent.id,'PUT',this.agentForm);
      } else {
        data = await this.api('/agents','POST',this.agentForm);
      }
      this.saving=false;
      if (data.error) { this.toast(data.error,'error'); return; }
      this.toast(this.lang==='de'?'Agent gespeichert ✓':'Agent saved ✓','success');
      await this.loadAgents();
      if (!this.editingAgent) {
        this.editingAgent = data.agent;
        this.agentTab='embed';
      }
    },

    async deleteAgent() {
      if (!confirm(this.lang==='de'?'Agent wirklich löschen?':'Delete agent?')) return;
      await this.api('/agents/'+this.editingAgent.id,'DELETE');
      this.showAgentModal=false; this.editingAgent=null;
      await this.loadAgents();
      this.toast(this.lang==='de'?'Agent gelöscht':'Agent deleted');
    },

    addChip() {
      const v=this.chipInput.trim();
      if (!v||this.agentForm.quick_chips.length>=5) return;
      this.agentForm.quick_chips.push(v); this.chipInput='';
    },

    async loadKeys() {
      const data = await this.api('/keys');
      if (data.keys) this.apiKeys = data.keys;
    },

    async createKey() {
      const data = await this.api('/keys','POST',this.newKeyForm);
      if (data.error) { this.toast(data.error,'error'); return; }
      this.newKeyRevealed = data.key;
      this.showNewKey=false;
      await this.loadKeys();
      this.toast(this.lang==='de'?'API Key erstellt!':'API key created!','success');
    },

    async deleteKey(id) {
      if (!confirm(this.lang==='de'?'Key löschen?':'Delete key?')) return;
      await this.api('/keys/'+id,'DELETE');
      await this.loadKeys();
      this.toast(this.lang==='de'?'Key gelöscht':'Key deleted');
    },

    copy(text) {
      navigator.clipboard.writeText(text).then(()=>this.toast(this.lang==='de'?'Kopiert!':'Copied!'));
    },

    toast(msg, type='success') {
      const id=Date.now();
      this.toasts.push({id,msg,type});
      setTimeout(()=>this.toasts=this.toasts.filter(t=>t.id!==id),3500);
    }
  }
}
</script>
</body>
</html>

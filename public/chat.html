<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentKontor Chat</title>
<style>
  :root{--bg:#07070f;--card:#12121f;--border:rgba(255,255,255,.08);--purple:#6c5ce7;--white:#fff;--muted:#6b6b8a;--text:#d0d0e8;--agent-color:#6c5ce7}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  .chat-header{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0}
  .chat-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
  .chat-name{font-size:1rem;font-weight:700;color:var(--white)}
  .chat-status{font-size:.72rem;display:flex;align-items:center;gap:5px}
  .chat-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .chat-desc{font-size:.78rem;color:var(--muted);margin-left:auto}

  .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

  .msg{display:flex;gap:10px;max-width:85%}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:2px}
  .msg.user .msg-av{background:rgba(255,255,255,.08)}
  .bubble{padding:10px 14px;border-radius:14px;font-size:.9rem;line-height:1.55;word-break:break-word;white-space:pre-wrap}
  .msg.assistant .bubble{background:#1e1e38;color:#e0e0f0;border-bottom-left-radius:3px}
  .msg.user .bubble{color:#fff;border-bottom-right-radius:3px}
  .msg-time{font-size:.65rem;color:var(--muted);margin-top:3px;padding:0 4px}

  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 12px}
  .chip{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:.8rem;cursor:pointer;transition:all .2s;color:var(--text)}
  .chip:hover{border-color:var(--agent-color);background:rgba(108,92,231,.1);color:var(--white)}

  .typing{display:flex;align-items:center;gap:4px;padding:10px 14px;background:#1e1e38;border-radius:14px;border-bottom-left-radius:3px;width:fit-content}
  .typing span{width:7px;height:7px;background:#a29bfe;border-radius:50%;animation:bounce .8s infinite}
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

  .input-area{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
  .inp{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--white);font-size:.9rem;resize:none;line-height:1.4;max-height:120px;font-family:inherit;transition:border-color .2s}
  .inp:focus{outline:none;border-color:var(--agent-color);background:rgba(108,92,231,.05)}
  .inp::placeholder{color:var(--muted)}
  .send{width:44px;height:44px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;flex-shrink:0}
  .send:disabled{opacity:.4;cursor:not-allowed}

  .branding{text-align:center;padding:6px;font-size:.68rem;color:rgba(255,255,255,.18);flex-shrink:0}
  .branding a{color:rgba(255,255,255,.25);text-decoration:none}

  .loading-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  .spinner{width:40px;height:40px;border:3px solid rgba(108,92,231,.2);border-top-color:var(--purple);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);text-align:center;padding:32px}

  .welcome-card{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.2);border-radius:12px;padding:20px;text-align:center;align-self:center;max-width:360px}
  .welcome-emoji{font-size:2.5rem;margin-bottom:8px}
  .welcome-name{font-size:1rem;font-weight:700;color:var(--white);margin-bottom:4px}
  .welcome-greeting{font-size:.85rem;color:var(--muted);line-height:1.5}
</style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh">
  <div class="loading-screen" id="loadingScreen"><div class="spinner"></div><div style="font-size:.85rem;color:var(--muted)">Lade Agent...</div></div>
  <div class="error-screen" id="errorScreen" style="display:none"><div style="font-size:2rem">😕</div><div style="color:var(--white);font-weight:600">Agent nicht verfügbar</div><div style="font-size:.84rem">Dieser Agent existiert nicht oder ist inaktiv.</div></div>
  <div id="chatUi" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div class="chat-header" id="chatHeader"></div>
    <div class="messages" id="messages"></div>
    <div class="chips" id="chips"></div>
    <div class="input-area">
      <textarea class="inp" id="inp" rows="1" placeholder="Nachricht eingeben..."></textarea>
      <button class="send" id="sendBtn" disabled>➤</button>
    </div>
    <div class="branding">Powered by <a href="/" target="_blank">AgentKontor</a></div>
  </div>
</div>

<script>
  const publicId = location.pathname.split('/chat/')[1];
  let agent = null;
  let sessionId = 'session_' + Math.random().toString(36).slice(2);
  let messages = [];
  let isTyping = false;
  let chipsShown = true;

  const msgsEl = document.getElementById('messages');
  const inpEl = document.getElementById('inp');
  const sendBtn = document.getElementById('sendBtn');

  async function init() {
    try {
      const res = await fetch(`/api/agents/public/${publicId}`);
      const data = await res.json();
      if (!res.ok || !data.agent) throw new Error();

      agent = data.agent;
      document.title = agent.name + ' – AgentKontor';

      // Apply color
      document.documentElement.style.setProperty('--agent-color', agent.color);

      // Header
      document.getElementById('chatHeader').innerHTML = `
        <div class="chat-av" style="background:${agent.color}22;border:1px solid ${agent.color}44">${agent.emoji}</div>
        <div>
          <div class="chat-name">${agent.name}</div>
          <div class="chat-status"><span class="chat-dot" style="background:#00cec9"></span><span style="color:#00cec9">Online</span></div>
        </div>
        ${agent.description ? `<div class="chat-desc">${agent.description.slice(0,60)}</div>` : ''}
      `;

      // Show welcome
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('chatUi').style.display = 'flex';

      addMessage('assistant', agent.greeting, true);

      // Chips
      if (agent.quick_chips?.length) {
        const chipsEl = document.getElementById('chips');
        chipsEl.innerHTML = agent.quick_chips.map(c =>
          `<span class="chip" onclick="sendText('${c.replace(/'/g,"\\'")}');document.getElementById('chips').innerHTML=''">${c}</span>`
        ).join('');
      }

      sendBtn.style.background = agent.color;
      sendBtn.disabled = false;
    } catch(e) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'flex';
    }
  }

  function addMessage(role, text, isWelcome=false) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const av = role === 'user' ? '👤' : agent?.emoji || '🤖';
    const bgStyle = role === 'user' ? `style="background:${agent?.color || '#6c5ce7'}"` : '';

    div.innerHTML = `
      <div class="msg-av">${av}</div>
      <div>
        <div class="bubble" ${bgStyle}>${escHtml(text)}</div>
        <div class="msg-time">${time}</div>
      </div>
    `;
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    if (role === 'user' || role === 'assistant') {
      messages.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
    }
  }

  function showTyping() {
    const div = document.createElement('div');
    div.id = 'typing-indicator';
    div.className = 'msg assistant';
    div.innerHTML = `<div class="msg-av">${agent?.emoji||'🤖'}</div><div class="typing"><span></span><span></span><span></span></div>`;
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  async function sendText(text) {
    if (!text.trim() || isTyping) return;
    document.getElementById('chips').innerHTML = '';
    addMessage('user', text);
    isTyping = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(`/api/chat/${publicId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, sessionId, source: 'web' })
      });
      const data = await res.json();
      document.getElementById('typing-indicator')?.remove();
      if (data.reply) addMessage('assistant', data.reply);
    } catch(e) {
      document.getElementById('typing-indicator')?.remove();
      addMessage('assistant', '⚠️ Fehler. Bitte versuche es erneut.');
    }
    isTyping = false;
    sendBtn.disabled = !inpEl.value.trim();
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  inpEl.addEventListener('input', () => {
    sendBtn.disabled = !inpEl.value.trim() || isTyping;
    inpEl.style.height = 'auto';
    inpEl.style.height = Math.min(inpEl.scrollHeight, 120) + 'px';
  });

  inpEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = inpEl.value.trim();
      if (text) { inpEl.value = ''; inpEl.style.height = 'auto'; sendBtn.disabled = true; sendText(text); }
    }
  });

  sendBtn.addEventListener('click', () => {
    const text = inpEl.value.trim();
    if (text) { inpEl.value = ''; inpEl.style.height = 'auto'; sendBtn.disabled = true; sendText(text); }
  });

  init();
</script>
</body>
</html>
